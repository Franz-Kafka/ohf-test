backend:
  name: github
  repo: Franz-Kafka/ohf-test
  branch: main
  base_url: https://sveltia-cms-auth.mail-fd1.workers.dev

media_folder: "src/assets/img"
public_folder: "/assets/img"

collections:
  - name: "doku"
    label: "Projektdokumentation"
    folder: "src/doku"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/page.njk" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "doku" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "lernmaterial"
    label: "Lernmaterial 1848/49"
    folder: "src/lernmaterial"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/lernmaterial.njk" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "lernmaterial" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }
      - label: "Thema"
        name: "thema"
        widget: "select"
        options:
          - "Demokratiegeschichte 1848/49"
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "abgeordnete"
    label: "Abgeordnete (Planspiel)"
    folder: "src/lernmaterial/abgeordnete"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/lernmaterial.njk" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "abgeordnete" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }
      - { label: "Thema", name: "thema", widget: "hidden", default: "Planspiel 1848" }
      - { label: "Inhalt", name: "body", widget: "markdown" }

  - name: "frauen"
    label: "Frauen (Planspiel)"
    folder: "src/lernmaterial/frauen"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschreibung", name: "description", widget: "text" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/lernmaterial.njk" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "frauen" }
      - { label: "Reihenfolge", name: "order", widget: "number", value_type: "int" }
      - { label: "Thema", name: "thema", widget: "hidden", default: "Planspiel 1848" }
      - { label: "Inhalt", name: "body", widget: "markdown" }
